<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sepet - MermerPark</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand"><h1><a href="./">MermerPark</a></h1></div>
      <nav class="nav-links"><a href="./#urunler">Ürünler</a><a href="./#iletisim">İletişim</a></nav>
    </div>
  </header>

  <main class="container" style="padding:2.5rem 0">
    <h2>Sepetiniz</h2>
    <div id="cartRoot"></div>
    <div style="margin-top:1rem">
      <button id="clear" class="button" style="background:#c0392b">Sepeti Temizle</button>
      <button id="checkout" class="button" style="background:#27ae60">Satın Al (Demo)</button>
    </div>
  </main>

  <script>
    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('mp_cart') || '[]');
      const root = document.getElementById('cartRoot');
      if (!cart.length) { root.innerHTML = '<p>Sepetiniz boş.</p>'; return; }
      root.innerHTML = cart.map(item => `
        <div style="display:flex;gap:1rem;align-items:center;padding:0.75rem;border-radius:10px;background:var(--surface);margin-bottom:0.6rem">
          <img src="${item.image}" style="width:90px;height:70px;object-fit:cover;border-radius:8px"/>
          <div style="flex:1">
            <a href="product.html?id=${item.id}"><strong>${item.title}</strong></a>
            <div style="color:var(--muted)">${item.price}</div>
            <div style="margin-top:0.5rem">Adet: <input class="qty" data-id="${item.id}" type="number" value="${item.qty}" min="1" style="width:70px;padding:0.3rem;border-radius:6px;border:1px solid #ddd"/></div>
          </div>
          <button class="remove" data-id="${item.id}" style="background:transparent;border:1px solid #ddd;padding:0.5rem 0.8rem;border-radius:8px">Kaldır</button>
        </div>
      `).join('');
      document.querySelectorAll('.remove').forEach(b => b.addEventListener('click', e => {
        const id = e.currentTarget.dataset.id;
        const c = JSON.parse(localStorage.getItem('mp_cart') || '[]').filter(i => i.id !== id);
        localStorage.setItem('mp_cart', JSON.stringify(c)); renderCart();
      }));
      document.querySelectorAll('.qty').forEach(inp => inp.addEventListener('change', e => {
        const id = e.currentTarget.dataset.id;
        const v = parseInt(e.currentTarget.value) || 1;
        const c = JSON.parse(localStorage.getItem('mp_cart') || '[]');
        const it = c.find(i => i.id === id); if (it) it.qty = v;
        localStorage.setItem('mp_cart', JSON.stringify(c)); renderCart();
      }));
    }
    document.getElementById('clear').addEventListener('click', () => { localStorage.removeItem('mp_cart'); renderCart(); });
    document.getElementById('checkout').addEventListener('click', () => { alert('Demo: gerçek ödeme entegrasyonu yok. Sipariş bilgileri e-posta yoluyla alınabilir.'); });
    renderCart();
  </script>
</body>
</html>
